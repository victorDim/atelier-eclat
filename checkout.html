<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout | Atelier Éclat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero detail-hero">
      <nav class="nav container">
        <a href="index.html" class="brand">Atelier Éclat</a>
        <div class="nav-links">
          <a href="index.html#shop">Shop</a>
          <a href="dashboard.html">Dashboard</a>
          <a href="account.html">Account</a>
          <button class="cart-toggle" id="cartToggle" type="button">Cart <span id="cartCount">0</span></button>
        </div>
      </nav>
      <div class="container detail-hero-content checkout-layout">
        <div class="detail-copy">
          <p class="eyebrow">Secure Concierge Checkout</p>
          <h1>Reserve and secure your selection.</h1>
          <p class="lead">Complete your reservation with a private payment intent and concierge confirmation.</p>
        </div>
      </div>
    </header>

    <main class="container section checkout-page">
      <div class="checkout-card">
        <h2>Payment details</h2>
        <form id="checkoutForm" class="contact-form checkout-form">
          <input type="text" name="name" placeholder="Full name" required />
          <input type="email" name="email" placeholder="Email address" required />
          <select name="provider" class="contact-form-select">
            <option value="mock">Secure concierge payment</option>
            <option value="stripe">Stripe</option>
            <option value="paypal">PayPal</option>
          </select>
          <input type="text" name="card" placeholder="Card number" required />
          <input type="text" name="expiry" placeholder="MM/YY" required />
          <input type="text" name="cvc" placeholder="CVC" required />
          <button class="btn btn-primary" type="submit">Confirm reservation</button>
          <p id="checkoutStatus" class="form-status" role="status" aria-live="polite"></p>
        </form>
      </div>
      <div class="checkout-card">
        <h2>Order summary</h2>
        <div id="checkoutSummary"></div>
      </div>
    </main>

    <aside class="cart-overlay" id="cartOverlay"></aside>
    <aside class="cart-drawer" id="cartDrawer" aria-label="Shopping cart">
      <div class="cart-head">
        <h3>Your Cart</h3>
        <button type="button" id="closeCart" class="close-cart">×</button>
      </div>
      <div id="cartItems" class="cart-items"></div>
      <div class="cart-footer">
        <div class="cart-total"><span>Total</span><strong id="cartTotal">$0</strong></div>
        <a class="btn btn-primary wide" href="checkout.html">Continue to Checkout</a>
      </div>
    </aside>

    <script src="script.js"></script>
  </body>
</html>
