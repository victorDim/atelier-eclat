<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Details | Atelier Éclat</title>
    <meta name="description" content="Discover the craftsmanship, materials, and details behind each Atelier Éclat piece." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero detail-hero">
      <nav class="nav container">
        <a href="index.html" class="brand">Atelier Éclat</a>
        <div class="nav-links">
          <a href="index.html#shop">Shop</a>
          <a href="dashboard.html">Dashboard</a>
          <a href="account.html">Account</a>
          <a href="checkout.html">Checkout</a>
          <button class="cart-toggle" id="cartToggle" type="button">Cart <span id="cartCount">0</span></button>
        </div>
      </nav>
      <div class="container detail-hero-content">
        <div class="detail-copy">
          <p class="eyebrow">Private Collection</p>
          <h1 id="detailTitle">Loading piece…</h1>
          <p class="lead" id="detailDescription"></p>
          <div class="hero-actions">
            <button class="btn btn-primary" id="detailAdd" type="button">Add to Cart</button>
            <button class="btn btn-secondary" id="detailWishlist" type="button">Save for later</button>
            <a href="index.html#shop" class="btn btn-secondary">Back to Collection</a>
          </div>
          <ul class="trust-list">
            <li>Certified craftsmanship</li>
            <li>Complimentary consultations</li>
            <li>Insured delivery</li>
          </ul>
        </div>
        <div class="hero-card" id="detailImageWrap"></div>
      </div>
    </header>

    <main class="container section" id="detailContent"></main>

    <aside class="cart-overlay" id="cartOverlay"></aside>
    <aside class="cart-drawer" id="cartDrawer" aria-label="Shopping cart">
      <div class="cart-head">
        <h3>Your Cart</h3>
        <button type="button" id="closeCart" class="close-cart">×</button>
      </div>
      <div id="cartItems" class="cart-items"></div>
      <div class="cart-footer">
        <div class="cart-total"><span>Total</span><strong id="cartTotal">$0</strong></div>
        <a class="btn btn-primary wide" href="checkout.html">Continue to Checkout</a>
      </div>
    </aside>

    <script src="script.js"></script>
  </body>
</html>
